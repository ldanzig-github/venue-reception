# Nginx server block for the venue reception dashboard.
# Drop into /etc/nginx/sites-available/ and symlink into sites-enabled.
# Replace SUBDOMAIN_HERE with whatever hostname you want, then:
#   sudo certbot --nginx -d SUBDOMAIN_HERE.example.com
#
# Or if you'd rather just use api.playbook.city's existing TLS:
#   add `location /dashboard/ { proxy_pass http://127.0.0.1:8090; }` to that vhost.

server {
    listen 80;
    server_name SUBDOMAIN_HERE.example.com;

    # Force HTTPS (certbot will rewrite this section after issuing the cert)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name SUBDOMAIN_HERE.example.com;

    # ssl_certificate     /etc/letsencrypt/live/SUBDOMAIN_HERE.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/SUBDOMAIN_HERE.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }
}
